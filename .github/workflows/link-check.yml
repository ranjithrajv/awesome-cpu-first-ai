name: Link Check

on:
  schedule:
    - cron: '0 6 * * 1'       # every Monday at 06:00 UTC
  push:
    branches: [main, master]
    paths:
      - README.md
      - CONTRIBUTING.md
      - docs/**
  pull_request:
    paths:
      - README.md
      - CONTRIBUTING.md
      - docs/**
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config lychee.toml
            --verbose
            --no-progress
            README.md
            CONTRIBUTING.md
            docs/
          fail: true
          output: ${{ runner.temp }}/lychee-report.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[auto] Broken links detected $(date -u +%Y-%m-%d)" \
            --body-file "${{ runner.temp }}/lychee-report.md" \
            --label maintenance
