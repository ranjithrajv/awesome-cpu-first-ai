name: Staleness Check

on:
  schedule:
    - cron: '0 7 1 * *'       # first of every month at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check repository staleness
        uses: ./.github/actions/run-staleness-check
        with:
          script: .github/scripts/check-staleness.py
          issue-title: "[auto] Stale or archived repos"
          report-file: /tmp/staleness.md
          github-token: ${{ secrets.GITHUB_TOKEN }}

  content-staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check content staleness
        uses: ./.github/actions/run-staleness-check
        with:
          script: .github/scripts/check-content-staleness.py
          issue-title: "[auto] Content needing re-verification"
          report-file: /tmp/content-staleness.md
          github-token: ${{ secrets.GITHUB_TOKEN }}
