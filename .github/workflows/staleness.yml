name: Staleness Check

on:
  schedule:
    - cron: '0 7 1 * *'       # first of every month at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check repository staleness
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # continue-on-error keeps the job green; outcome captures the real result.
        continue-on-error: true
        run: |
          python3 .github/scripts/check-staleness.py | tee /tmp/staleness.md

      - name: Open issue on stale repos
        if: steps.check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[auto] Stale or archived repos $(date -u +%Y-%m)" \
            --body-file /tmp/staleness.md \
            --label maintenance
